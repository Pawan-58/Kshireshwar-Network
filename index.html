<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Opening — Khireshwar Network</title>
    <meta http-equiv="refresh" content="1;url=kshireshwar_network_website.html">
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;margin:32px;background:#f6f9fb;color:#111}
      .box{max-width:780px;margin:40px auto;padding:18px;background:#fff;border-radius:10px;border:1px solid #e6eef6}
      .actions{display:flex;gap:12px;margin-top:12px}
      .button{background:#0366d6;color:#fff;padding:10px 14px;border-radius:8px;text-decoration:none}
      .muted{color:#6b7280}
    </style>
    <script>
      // Graceful redirect with countdown and hub fallback
      let t = 3;
      function tick(){
        const el = document.getElementById('count');
        if(!el) return;
        el.textContent = t;
        if(t<=0) return;
        t -= 1;
        setTimeout(tick,1000);
      }
      window.addEventListener('load', ()=>{tick()});
    </script>
  </head>
  <body>
    <div class="box">
      <h1 style="margin:0">Opening network website…</h1>
      <p class="muted" style="margin:8px 0">You will be redirected shortly (<span id="count">3</span>).</p>
      <p class="muted">If you prefer, choose an option below:</p>
      <div class="actions">
        <a class="button" href="kshireshwar_network_website.html">Open network website now</a>
        <a style="padding:10px 14px;border-radius:8px;border:1px solid #d1d5db;background:#fff;text-decoration:none" href="hub.html">Open professional hub</a>
        <a style="padding:10px 14px;border-radius:8px;border:1px solid #d1d5db;background:#fff;text-decoration:none" href="KSHIRESHWAR_DOCUMENTATION.md">Open docs</a>
      </div>
      <p style="margin-top:12px;color:var(--muted)">If redirection does not work, click one of the links above.</p>
    </div>
  </body>
</html>
