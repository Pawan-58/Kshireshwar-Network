<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create account — Kshireshwar Network</title>
  <link rel="stylesheet" href="index.css">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;background:#f6f9fb;margin:0}
    .wrap{max-width:520px;margin:48px auto;padding:20px}
    .card{background:#fff;padding:28px;border-radius:12px;border:1px solid #e6eef6}
    h1{margin:0 0 8px}
    label{display:block;margin:12px 0 6px;font-weight:600}
    input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #d1d5db}
    .actions{display:flex;gap:10px;margin-top:14px}
    .btn{padding:10px 14px;border-radius:8px;border:none;cursor:pointer}
    .btn-primary{background:#0366d6;color:#fff}
    .muted{color:#6b7280}
    .small{font-size:0.9rem}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Create account</h1>
      <p class="muted">Create a new account to manage your connection and payments.</p>

      <form id="regForm" novalidate>
        <label for="fullname">Full name</label>
        <input id="fullname" name="fullname" placeholder="Your full name" required autocomplete="name">

        <label for="phone">Phone number</label>
        <input id="phone" name="phone" placeholder="98XXXXXXXX" required inputmode="numeric" pattern="[0-9]{7,15}" maxlength="15" autocomplete="tel">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Choose a secure password" required>

        <label for="confirm">Confirm password</label>
        <input id="confirm" name="confirm" type="password" placeholder="Repeat password" required>

        <div style="margin-top:10px">
          <label for="plan">Choose plan (optional)</label>
          <select id="plan">
            <option value="Home Starter">Home Starter</option>
            <option value="Home Pro">Home Pro</option>
            <option value="Home Max">Home Max</option>
          </select>
        </div>

        <div class="actions">
          <button id="createBtn" class="btn btn-primary" type="submit">Create account</button>
          <a class="btn" href="signin.html" style="background:#fff;border:1px solid #d1d5db;padding:10px 12px;border-radius:8px">Back to sign in</a>
        </div>
        <div id="msg" style="margin-top:12px;color:#6b7280"></div>
      </form>
    </div>
  </div>

  <script type="module">
    import { auth } from './firebase.js';
    import { createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || 'kshireshwar_dashboard.html';

    function makeToken(){ return 'token_' + Math.random().toString(36).slice(2); }
    function validPhone(p){ return /^[0-9]{7,15}$/.test(p); }

    function getUsers(){ try{ return JSON.parse(localStorage.getItem('kshireshwar_users')||'[]') }catch(e){return []} }
    function saveUser(u){ const users = getUsers(); users.push(u); localStorage.setItem('kshireshwar_users', JSON.stringify(users)); localStorage.setItem('kshireshwar_user', JSON.stringify(u)); }

    document.getElementById('regForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const full = document.getElementById('fullname').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      const conf = document.getElementById('confirm').value;
      const plan = document.getElementById('plan').value;
      const msg = document.getElementById('msg'); msg.textContent='';

      if(!full){ msg.textContent='Full name is required.'; document.getElementById('fullname').focus(); return; }
      if(!validPhone(phone)){ msg.textContent='Enter valid phone (digits only).'; document.getElementById('phone').focus(); return; }
      if(!pw || pw.length < 6){ msg.textContent='Password must be at least 6 characters.'; document.getElementById('password').focus(); return; }
      if(pw !== conf){ msg.textContent='Passwords do not match.'; document.getElementById('confirm').focus(); return; }

      // If Firebase is configured, create account there
      if(auth){
        try{
          const userCredential = await createUserWithEmailAndPassword(auth, email, pw);
          // on success, store minimal local marker and redirect
          const user = { fullname: full, email, phone, plan };
          localStorage.setItem('kshireshwar_user', JSON.stringify(user));
          localStorage.setItem('kshireshwar_auth', JSON.stringify({ token: makeToken(), user, createdAt: new Date().toISOString() }));
          window.location.href = next;
          return;
        }catch(err){ msg.textContent = err.message || 'Registration failed'; return; }
      }

      // Fallback: localStorage registration
      const users = getUsers();
      if(users.find(u => (u.email && email && u.email.toLowerCase()===email.toLowerCase()) || (u.phone && u.phone===phone))){ msg.textContent='An account with this email or phone already exists.'; return; }

      const user = { fullname: full, phone, email, password: pw, plan };
      saveUser(user);

      // set auth and redirect
      const authLocal = { token: makeToken(), user, createdAt: new Date().toISOString() };
      localStorage.setItem('kshireshwar_auth', JSON.stringify(authLocal));

      // redirect to next
      window.location.href = next;
    });
  </script>
</body>
</html>
