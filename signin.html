<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign in — Kshireshwar Network</title>
  <link rel="stylesheet" href="index.css">
  <style>
    /* Dark, focused sign-in style inspired by GitHub */
    :root{--bg:#0b0f14;--card:#0f1720;--muted:#9aa3ad;--accent:#2ea44f;--primary:#2188ff}
    html,body{height:100%;margin:0}
    body{font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;background:var(--bg);color:#e6eef6;display:flex;align-items:center;justify-content:center}
    .container{width:420px;padding:36px 32px;border-radius:10px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));box-shadow:0 10px 30px rgba(2,6,23,0.6)}
    .logo{display:flex;justify-content:center;margin-bottom:12px}
    .logo img{width:64px;height:64px;border-radius:50%;background:#fff;padding:8px}
    h1{margin:6px 0 6px;text-align:center;font-size:20px}
    .sub{color:var(--muted);text-align:center;margin-bottom:18px}
    .field{margin-bottom:12px}
    label{display:block;font-weight:600;margin-bottom:8px;color:#e6eef6}
    input[type=text],input[type=password]{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:#e6eef6}
    .actions{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
    .btn{display:inline-block;padding:12px 18px;border-radius:8px;font-weight:700;cursor:pointer;border:none}
    .btn-sign{background:var(--accent);color:#fff;flex:1}
    .btn-cancel{background:transparent;border:1px solid rgba(255,255,255,0.06);color:#e6eef6;padding:10px 12px;border-radius:8px;margin-left:12px}
    .divider{display:flex;align-items:center;margin:18px 0;color:var(--muted)}
    .divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,0.03)}
    .divider span{padding:0 12px;color:var(--muted)}
    .socials{display:flex;flex-direction:column;gap:10px}
    .social-btn{padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#e6eef6;display:flex;align-items:center;gap:10px}
    .foot{margin-top:14px;text-align:center;color:var(--muted)}
    a.link{color:var(--primary);text-decoration:none;font-weight:600}
    .error{color:#ffb3b3;font-size:0.9rem;margin-top:6px}
  </style>
</head>
<body>
  <div class="container" role="main">
    <div class="logo"><img src="assets/logo.png" alt="logo" onerror="this.style.display='none'"></div>
    <h1>Sign in to Kshireshwar Network</h1>
    <div class="sub">Enter your credentials to continue</div>

    <form id="signinForm" novalidate>
      <div class="field">
        <label for="identifier">Username or email address</label>
        <input id="identifier" name="identifier" type="text" placeholder="you@example.com or username" autocomplete="username" aria-describedby="identifierError">
        <div id="identifierError" class="error" aria-live="polite"></div>
      </div>

      <div class="field">
        <label for="password">Password <a href="#" id="forgotLink" style="float:right;color:var(--primary);font-weight:600">Forgot password?</a></label>
        <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" aria-describedby="passwordError">
        <div id="passwordError" class="error" aria-live="polite"></div>
      </div>

      <div class="actions">
        <button class="btn btn-sign" type="submit">Sign in</button>
        <a class="btn-cancel" href="kshireshwar_network_website.html">Cancel</a>
      </div>
    </form>

    <div class="divider"><span>or</span></div>

    <div class="socials">
      <button class="social-btn" id="googleBtn"> <img src="assets/google.svg" alt="g" style="width:18px"> Continue with Google</button>
      <button class="social-btn" id="appleBtn"> <img src="assets/apple.svg" alt="a" style="width:18px"> Continue with Apple</button>
    </div>

    <div class="foot">New to Kshireshwar? <a class="link" href="register.html">Create an account</a></div>
  </div>

  <script type="module">
    import { auth } from './firebase.js';
    import { signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || 'kshireshwar_dashboard.html';

    function makeToken(){ return 'token_' + Math.random().toString(36).slice(2); }
    function clearErrors(){ document.getElementById('identifierError').textContent=''; document.getElementById('passwordError').textContent=''; }

    document.getElementById('signinForm').addEventListener('submit', async (e)=>{
      e.preventDefault(); clearErrors();
      const id = document.getElementById('identifier').value.trim();
      const pw = document.getElementById('password').value;
      if(!id){ document.getElementById('identifierError').textContent='Enter username or email.'; return; }
      if(!pw){ document.getElementById('passwordError').textContent='Enter your password.'; return; }

      // If Firebase is configured, prefer server auth
      if(auth){
        try{
          await signInWithEmailAndPassword(auth, id, pw);
          // on success, store a simple client-side marker and redirect
          const token = makeToken(); const user = { email: id };
          localStorage.setItem('kshireshwar_auth', JSON.stringify({ token, user, createdAt: new Date().toISOString() }));
          window.location.href = next;
          return;
        }catch(err){
          document.getElementById('passwordError').textContent = err.message || 'Sign-in failed';
          return;
        }
      }

      // Fallback: simple demo/local auth
      const stored = JSON.parse(localStorage.getItem('kshireshwar_user') || 'null');
      let user = null;
      if(id.toLowerCase && id.toLowerCase() === 'demo@kshireshwar.com' && pw === 'demo123'){
        user = { name: 'Demo User', email: 'demo@kshireshwar.com' };
      } else if(stored && (id === stored.email || id === stored.phone || id === stored.fullname) && pw === stored.password){
        user = { name: stored.fullname || stored.email, email: stored.email, phone: stored.phone };
      } else {
        const users = JSON.parse(localStorage.getItem('kshireshwar_users') || '[]');
        const found = users.find(u => (u.email && id.toLowerCase && u.email.toLowerCase()===id.toLowerCase()) || (u.phone && u.phone===id) || (u.fullname && u.fullname===id));
        if(found && found.password === pw) user = { name: found.fullname, email: found.email, phone: found.phone };
      }

      if(!user){ if(!confirm('Credentials not found. Create a local demo account with these credentials?')) return; const newUser = { fullname: id.split('@')[0] || id, email: id.includes('@')? id : '', phone: id.match(/^\\d+$/)? id : '', password: pw }; const users = JSON.parse(localStorage.getItem('kshireshwar_users')||'[]'); users.push(newUser); localStorage.setItem('kshireshwar_users', JSON.stringify(users)); localStorage.setItem('kshireshwar_user', JSON.stringify(newUser)); user = { name: newUser.fullname, email: newUser.email }; }

      const token = makeToken(); const authLocal = { token, user, createdAt: new Date().toISOString() };
      localStorage.setItem('kshireshwar_auth', JSON.stringify(authLocal));
      window.location.href = next;
    });

    document.getElementById('googleBtn').addEventListener('click', ()=>{ alert('External login not configured in demo'); });
    document.getElementById('appleBtn').addEventListener('click', ()=>{ alert('External login not configured in demo'); });
    document.getElementById('forgotLink').addEventListener('click', (e)=>{ e.preventDefault(); alert('Password reset demo — integrate with backend'); });
  </script>
</body>
</html>
